# ============================================================================
# CBAS — Nginx config for digixworkspace.com/cbas
#
# CBAS runs under the SUB-PATH /cbas. The Next.js app is built with
# basePath=/cbas and listens on 127.0.0.1:3050. The Python AI Engine listens on
# 127.0.0.1:8088 and is called only server-side by Next.js, so it is NOT exposed.
#
# HOW TO USE:
#   Paste the `location /cbas` block below INTO your existing HTTPS server block
#   for digixworkspace.com (the one that already has `location / { ...3002 }`).
#
#   IMPORTANT: do NOT add a `location = /cbas { return 301 /cbas/; }` redirect.
#   Next.js (basePath + trailingSlash:false) normalizes /cbas/ -> /cbas itself;
#   an nginx redirect the other way creates an infinite redirect loop.
#   A single `location /cbas` prefix matches BOTH /cbas and /cbas/... .
#
#   Uses  Connection 'upgrade'  (a literal) so NO `map $http_upgrade ...` needed.
# ============================================================================

location /cbas {
    proxy_pass http://127.0.0.1:3050;   # keep the /cbas prefix (basePath); no trailing slash
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_cache_bypass $http_upgrade;

    # Tell Next.js the request arrived over HTTPS (TLS terminates here at Nginx)
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # CBAS specifics: CSV imports/uploads + the SSE notifications stream
    client_max_body_size 25m;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_buffering off;

    # Security headers ('always' so they apply to redirects/errors too)
    add_header Content-Security-Policy "upgrade-insecure-requests" always;
    add_header Permissions-Policy "xr-spatial-tracking=()" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
