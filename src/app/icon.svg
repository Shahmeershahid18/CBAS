<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a8f;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Dark navy background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Upward chart bars: 3 bars increasing in height -->
  <rect x="5" y="20" width="5" height="7" rx="1.5" fill="white" opacity="0.6"/>
  <rect x="13" y="15" width="5" height="12" rx="1.5" fill="white" opacity="0.8"/>
  <rect x="21" y="9" width="5" height="18" rx="1.5" fill="white"/>
  <!-- Upward arrow on top - changed to blood red for brand consistency -->
  <polyline points="23.5,4 26,8.5 21,8.5" fill="#be123c"/>
</svg>
